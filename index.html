<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <link rel="stylesheet" href="/src/styles.css" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Copylot</title>
    <script type="module" src="/src/settings.ts" defer></script>
    <script type="module" src="https://code.iconify.design/iconify-icon/2.1.0/iconify-icon.min.js"></script>
  </head>

  <body>
    <main class="container">
      <header>
        <h1>Copylot</h1>
        <p class="muted">AI 驱动的极简划词翻译</p>
      </header>

      <section class="card">
        <div class="card-header">
          <div class="card-actions">
            <button id="btn-reload" type="button" title="刷新配置">
              <iconify-icon icon="lucide:refresh-cw" width="16"></iconify-icon>
            </button>
            <button id="btn-reset" type="button" title="重置默认">
              <iconify-icon icon="lucide:rotate-ccw" width="16"></iconify-icon>
            </button>
          </div>
        </div>

        <div class="tabs" role="tablist" aria-label="Copylot tabs">
          <button class="tab is-active" id="tab-settings" type="button" role="tab" aria-selected="true" aria-controls="tab-panel-settings">设置</button>
          <button class="tab" id="tab-history" type="button" role="tab" aria-selected="false" aria-controls="tab-panel-history">历史</button>
        </div>

        <div id="tab-panel-settings" class="tab-panel is-active" role="tabpanel" aria-labelledby="tab-settings">
          <form id="settings-form" class="form">
            <label class="field">
              <span class="field-label">模型</span>
              <input id="cfg-model" placeholder="deepseek-chat" />
            </label>

            <label class="field">
              <span class="field-label">Base URL</span>
              <input id="cfg-base-url" placeholder="https://api.deepseek.com/v1" />
            </label>

            <label class="field">
              <span class="field-label">API Key</span>
              <span class="input-icon-wrap">
                <input id="cfg-api-key" placeholder="sk-..." />
                <button
                  id="btn-toggle-api-key"
                  class="icon-inside"
                  type="button"
                  aria-label="显示 API Key"
                  aria-pressed="false"
                >
                  <span class="sr-only"></span>
                  <iconify-icon class="icon-eye-off" icon="lucide:eye-off" width="18" height="18" aria-hidden="true"></iconify-icon>
                  <iconify-icon class="icon-eye" icon="lucide:eye" width="18" height="18" aria-hidden="true"></iconify-icon>
                </button>
              </span>
            </label>

            <label class="field">
              <span class="field-label">快捷键</span>
              <input id="cfg-hotkey" placeholder="Ctrl+Alt+Q" />
              <span class="field-hint">格式示例：Ctrl+Alt+Q / CommandOrControl+Shift+C</span>
            </label>

            <div class="actions">
              <button class="primary" type="submit">保存</button>
              <span id="cfg-status" class="status"></span>
            </div>
          </form>
        </div>

        <div id="tab-panel-history" class="tab-panel" role="tabpanel" aria-labelledby="tab-history">
          <div class="history-toolbar">
            <div class="muted">共 <span id="history-count">0</span> 条</div>
            <div class="card-actions">
              <button id="btn-history-reload" type="button">刷新</button>
              <button id="btn-history-clear" class="danger" type="button">清空</button>
              <span id="history-status" class="status"></span>
            </div>
          </div>
          <ol id="history-list" class="history-list"></ol>
        </div>
      </section>

      
    </main>
  </body>
</html>
